<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc" class="world-radio-atlas-mark">
  <title id="title">World Radio Atlas</title>
  <desc id="desc">Animated globe and broadcast tower mark for World Radio Atlas.</desc>
  <defs>
    <radialGradient id="bg" cx="36%" cy="24%" r="78%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="48%" stop-color="#081a44"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="signal" x1="126" x2="390" y1="120" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="52%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .world-radio-atlas-mark .orbit {
        animation: orbit-spin 18s linear infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .world-radio-atlas-mark .pulse {
        animation: pulse-ring 2.4s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .world-radio-atlas-mark .pulse.two {
        animation-delay: .45s;
      }
      .world-radio-atlas-mark .live-dot {
        animation: live-dot 1.35s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes orbit-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse-ring {
        0%, 100% { opacity: .22; transform: scale(.9); }
        50% { opacity: .9; transform: scale(1.04); }
      }
      @keyframes live-dot {
        0%, 100% { opacity: .72; transform: scale(.94); }
        50% { opacity: 1; transform: scale(1.16); }
      }
      @media (prefers-reduced-motion: reduce) {
        .world-radio-atlas-mark .orbit,
        .world-radio-atlas-mark .pulse,
        .world-radio-atlas-mark .live-dot { animation: none; }
      }
    </style>
  </defs>

  <rect width="512" height="512" rx="128" fill="#030712"/>
  <circle cx="256" cy="256" r="224" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="221" fill="none" stroke="#60a5fa" stroke-opacity=".2" stroke-width="3"/>

  <g class="orbit" fill="none" stroke="url(#signal)" stroke-linecap="round" opacity=".92">
    <ellipse cx="256" cy="256" rx="178" ry="58" stroke-width="8" transform="rotate(-24 256 256)"/>
    <ellipse cx="256" cy="256" rx="178" ry="58" stroke-width="5" transform="rotate(58 256 256)" opacity=".45"/>
  </g>

  <g fill="none" stroke="#bfdbfe" stroke-linecap="round" opacity=".52">
    <circle cx="256" cy="256" r="132" stroke-width="4"/>
    <path d="M124 256h264" stroke-width="4"/>
    <path d="M256 124c44 42 66 86 66 132s-22 90-66 132" stroke-width="4"/>
    <path d="M256 124c-44 42-66 86-66 132s22 90 66 132" stroke-width="4"/>
  </g>

  <g filter="url(#softGlow)">
    <path class="pulse" d="M172 328a92 92 0 0 1 168 0" fill="none" stroke="#7dd3fc" stroke-width="12" stroke-linecap="round"/>
    <path class="pulse two" d="M138 362a134 134 0 0 1 236 0" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke="#f8fafc" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 282v108" stroke-width="16"/>
    <path d="M219 410h74" stroke-width="14"/>
    <path d="M226 456l30-66 30 66" stroke-width="14"/>
    <path d="M210 456h92" stroke-width="12"/>
  </g>

  <circle class="live-dot" cx="256" cy="256" r="24" fill="#f8fafc"/>
  <circle cx="256" cy="256" r="10" fill="#0284c7"/>
</svg>
