<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">World Radio Atlas</title>
  <desc id="desc">A social preview image showing a map pin, radio waves, and the World Radio Atlas branding.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1730"/>
      <stop offset="0.52" stop-color="#10264c"/>
      <stop offset="1" stop-color="#08111f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(840 180) rotate(130) scale(320 260)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#27c2c1" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#27c2c1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pin" x1="250" y1="130" x2="470" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffeb9a"/>
      <stop offset="0.45" stop-color="#ffbb64"/>
      <stop offset="1" stop-color="#ff6a57"/>
    </linearGradient>
    <linearGradient id="panel" x1="650" y1="170" x2="1040" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11284b" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0d1c34" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="56" fill="url(#bg)"/>
  <circle cx="900" cy="180" r="240" fill="url(#glow)"/>

  <g opacity="0.22" stroke="#7ce7ea" stroke-width="2">
