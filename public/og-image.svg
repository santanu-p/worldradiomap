    <path d="M520 120V520"/>
    <path d="M640 120V520"/>
    <path d="M760 120V520"/>
    <path d="M880 120V520"/>
  </g>

  <rect x="660" y="134" width="408" height="360" rx="36" fill="url(#panel)" stroke="#69dfe7" stroke-opacity="0.22"/>
  <text x="706" y="236" fill="#f7fbff" font-family="Inter, Manrope, Arial, sans-serif" font-size="58" font-weight="800">World Radio Atlas</text>
  <text x="706" y="292" fill="#b9d7f0" font-family="Inter, Manrope, Arial, sans-serif" font-size="30" font-weight="600">Live radio stations on a global map</text>
  <text x="706" y="344" fill="#8ddfe3" font-family="Inter, Manrope, Arial, sans-serif" font-size="22" font-weight="600">Curated picks · filters · instant playback</text>

