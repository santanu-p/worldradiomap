<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #0f0;
            padding: 20px;
        }
        .log {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            border: 1px solid #0f0;
        }
        .success { color: #0f0; }
        .error { color: #f00; }
        .info { color: #00d4ff; }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 style="color: #00d4ff;">🔍 Radio Browser API Test</h1>
    
    <button onclick="testAPI()">🧪 Test API Connection</button>
    <button onclick="clearLog()">🗑️ Clear Log</button>
    
    <div id="log" class="log">
        <div class="info">Click "Test API Connection" to check if the API is reachable...</div>
    </div>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function testAPI() {
            clearLog();
            log('🚀 Starting API connection test...', 'info');
            
            const apis = [
                'https://de1.api.radio-browser.info/json/stations/search?limit=10&has_geo_info=true',
                'https://nl1.api.radio-browser.info/json/stations/search?limit=10&has_geo_info=true',
                'https://at1.api.radio-browser.info/json/stations/search?limit=10&has_geo_info=true',
                'https://fr1.api.radio-browser.info/json/stations/search?limit=10&has_geo_info=true'
            ];
            
            for (let i = 0; i < apis.length; i++) {
                const url = apis[i];
                const apiName = url.split('//')[1].split('.')[0];
                
                log(`Testing API ${i + 1}/4: ${apiName}...`, 'info');
                
                try {
                    const startTime = Date.now();
                    
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    const duration = Date.now() - startTime;
                    
                    if (!response.ok) {
                        log(`❌ ${apiName}: HTTP ${response.status} - ${response.statusText}`, 'error');
                        continue;
                    }
                    
                    const data = await response.json();
                    log(`✅ ${apiName}: SUCCESS! Got ${data.length} stations in ${duration}ms`, 'success');
                    
                    if (data.length > 0) {
                        log(`   Sample station: ${data[0].name} (${data[0].country})`, 'success');
                    }
                    
                } catch (error) {
                    log(`❌ ${apiName}: ${error.message}`, 'error');
                }
            }
            
            log('', 'info');
            log('✅ Test complete! If all failed, check your internet connection or firewall.', 'info');
            log('If some succeeded, your app should work - try refreshing index.html', 'info');
        }

        // Auto-run test on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => testAPI(), 500);
        });
    </script>
</body>
</html>
