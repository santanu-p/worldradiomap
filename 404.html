<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | World Radio Atlas</title>
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#05070b">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', system-ui, sans-serif;
            background: #05070a;
            background-image: radial-gradient(circle at 50% 40%, rgba(59, 130, 246, 0.08), transparent 60%);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { text-align: center; max-width: 500px; }
        .error-code {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 120px;
            font-weight: 800;
            color: #3b82f6;
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: -0.04em;
        }
        h1 {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #9ca3af;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            border-radius: 99px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }
        .radio-icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="radio-icon">📻</div>
        <div class="error-code">404</div>
        <h1>Station Not Found</h1>
        <p>The page you're looking for has gone off the air. Let's get you back to exploring world radio.</p>
        <a href="/" class="btn">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
            Back to World Radio Atlas
        </a>
    </div>
</body>
</html>
